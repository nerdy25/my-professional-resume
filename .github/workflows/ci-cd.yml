name: Build and Push to ECR
 
on:
  push:
    branches: [main]
    # pull_request:
    #   branches: ["main", "dev"]
 
permissions:
  id-token: write
  contents: read
 
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout-code
        uses: actions/checkout@v4
 
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: 1
 
      - name: Build Docker Image
        run: docker build -t ${{secrets.ECR_REPOSITORY}}my-repo:latest .
 
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{secrets.ECR_REPOSITORY}}my-repo:latest
          scan-type: 'image'
          severity: 'HIGH,CRITICAL'
          exit-code: 1
          ignore-unfixed: true
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{secrets.AWS_ROLE}}
          aws-region: us-east-1
 
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Push Image to ECR
        run: docker push ${{secrets.ECR_REPOSITORY}}my-repo:latest